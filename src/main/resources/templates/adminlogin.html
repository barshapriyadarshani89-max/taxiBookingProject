<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    position: relative;
}

/* dark overlay for better visibility */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
}

form{
    background:white;
    padding:35px;
    width:350px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

h2{
    text-align:center;
    margin-bottom:15px;
    font-size:16px;
}

.message{
    width:350px;
    text-align:center;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

    <!-- error message -->
    <div th:if="${param.error}" class="message">
        <h2 style="color:red;">INVALID CREDENTIALS</h2>
    </div>

    <!-- logout message -->
    <div th:if="${logout}" class="message">
        <h2 style="color:green;">YOU HAVE BEEN SUCCESSFULLY LOGGED OUT</h2>
    </div>

    <form action="/login" method="post">

        <input name="username"
               type="text"
               placeholder="enter username">

        <input name="password"
               type="password"
               placeholder="enter password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
