<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Change Credentials</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f9fafb;
}

form{
    background:#ffffff;
    padding:35px;
    width:360px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    border:1px solid #e5e7eb;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

button:hover{
    background:#1d4ed8;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#111827;
}

</style>

</head>

<body>

<form action="changeCredentials" method="post">

<h2>Change Credentials</h2>

<input type="text" name="oldusername" placeholder="Enter old Username">
<input type="text" name="oldpassword" placeholder="Enter old Password">

<input type="text" name="newusername" placeholder="Enter new Username">
<input type="text" name="newpassword" placeholder="Enter new Password">

<button type="submit">Change</button>

</form>

</body>
</html>
