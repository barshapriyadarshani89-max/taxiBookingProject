<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" >
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f9fafb;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#1f2937;
    font-weight:600;
}

h2{
    text-align:center;
    color:#16a34a;
    margin-bottom:15px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#ffffff;
    padding:30px;
    border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border:1px solid #e5e7eb;
}

/* links as soft buttons */
a{
    display:block;
    text-decoration:none;
    padding:12px;
    margin:10px 0;
    background:#e0f2fe;   /* light blue */
    color:#0f172a;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    font-weight:600;
    border:1px solid #bae6fd;
}

a:hover{
    background:#bae6fd;
}

/* logout special light red */
a.logout{
    background:#fee2e2;
    border:1px solid #fecaca;
    color:#991b1b;
}

a.logout:hover{
    background:#fecaca;
}

</style>

</head>

<body>

<div class="container">

<h2 th:text="${message}"></h2>

<h1>WELCOME TO ADMIN PANEL</h1>

<a href="readAllBookings">READ ALL BOOKINGS</a> <br>

<a href="readAllContacts">READ ALL CONTACTS</a> <br>

<a href="addService">ADD SERVICE</a> <br>

<a href="readAllBookings">READ ALL BOOKINGS</a> <br>

<a href='changeCredentials'>CHANGE CREDENTIALS</a>

<a href="/dologout" class="logout">LOGOUT</a>

</div>

</body>
</html>
