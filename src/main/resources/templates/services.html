<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Services</title>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" href="images/favicon.ico">
    <link rel="shortcut icon" href="images/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">

    <script src="js/jquery.js"></script>
    <script src="js/jquery-migrate-1.2.1.js"></script>
    <script src="js/script.js"></script>
    <script src="js/superfish.js"></script>
    <script src="js/jquery.ui.totop.js"></script>
    <script src="js/jquery.equalheights.js"></script>
    <script src="js/jquery.mobilemenu.js"></script>
    <script src="js/jquery.easing.1.3.js"></script>

    <script>
        $(document).ready(function () {
            $().UItoTop({ easingType: 'easeOutQuart' });
        });
    </script>

</head>

<body id="top">

<div class="main">

    <!--==============================header=================================-->
    <div th:insert="~{fragments/header.html}"></div>

    <!--==============================Content=================================-->
    <div class="content">

        <div class="container_12">

            <div class="grid_12">
                <h3>Services Overview</h3>

                <p>
                    We provide reliable and affordable taxi services for local travel,
                    airport transfers, outstation trips, and corporate rides.
                    Our goal is to ensure safe, comfortable, and on-time journeys
                    for every customer.
                </p>
            </div>

            <!-- Dynamic Services -->
            <div th:each="service : ${allservices}">

                <div class="grid_4">

                    <div class="box">

                        <div class="maxheight">

                            <!-- Service Image -->
                            <img th:src="@{'/myserviceimg/' + ${service.image}}"
                                 alt="Service Image"
                                 style="width:100%; height:220px; object-fit:cover;">

                            <!-- Service Title -->
                            <div class="text1 color2">
                                <a href="#" th:text="${service.title}">
                                    Service Title
                                </a>
                            </div>

                            <!-- Service Description -->
                            <p th:text="${service.description}">
                                Service Description
                            </p>

                            <br>

                            <!-- Book Button -->
                            <a href="/" class="btn">Book Now</a>

                        </div>

                    </div>

                </div>

            </div>

            <div class="clear"></div>

        </div>

    </div>

</div>

<!--==============================footer=================================-->

<div th:insert="~{fragments/footer.html}"></div>

<!--==============================footer=================================-->

</body>
</html>
